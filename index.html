<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Initial Deposit for Silver Jubilee</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111114;
      --surface: #1c1c21;
      --surface2: #25252c;
      --border: #2e2e38;
      --accent: #7b5cf0;
      --accent-dim: #3d2f80;
      --text: #f0f0f5;
      --text-muted: #8888a0;
      --text-sub: #5a5a72;
      --amount: #e0e0f0;
      --radius: 14px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── LOADER ── */
    #loader {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader p { color: var(--text-muted); font-size: 14px; }

    /* ── FILE PICKER FALLBACK ── */
    #file-picker {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px;
      z-index: 100;
    }
    #file-picker h2 { font-size: 20px; color: var(--text); }
    #file-picker p { font-size: 14px; color: var(--text-muted); text-align: center; line-height: 1.6; }
    .file-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .file-btn:hover { opacity: 0.85; }
    #file-input { display: none; }

    /* ── LIST VIEW ── */
    #list-view {
      display: none;
      flex-direction: column;
      flex: 1;
      padding: 20px 16px 16px;
      gap: 0;
    }

    .top-bar {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }
    .hamburger {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text-muted);
      border-radius: 2px;
    }

    .page-title { font-size: 28px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.3px; }

    /* search row */
    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
    }
    .search-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-wrap svg {
      position: absolute;
      left: 12px;
      color: var(--text-sub);
      pointer-events: none;
    }
    #search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 14px 11px 38px;
      color: var(--text);
      font-size: 15px;
      outline: none;
    }
    #search-input::placeholder { color: var(--text-sub); }
    #search-input:focus { border-color: var(--accent); }

    .filter-btn {
      width: 42px;
      height: 42px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      color: var(--accent);
    }

    /* grid */
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      flex: 1;
      align-content: start;
      align-items: start;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 14px 16px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }
    .card:active { transform: scale(0.97); }
    .card:hover { border-color: var(--accent-dim); }

    .card-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.3px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .card-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.35;
      word-break: break-word;
    }
    .card-amount {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 0;
      color: var(--text-muted);
      font-size: 15px;
    }

    /* pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 24px 0 16px;
    }
    .page-btn {
      min-width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .page-btn:disabled { opacity: 0.35; cursor: default; }
    .page-ellipsis { color: var(--text-sub); font-size: 14px; padding: 0 2px; }

    /* ── DETAIL VIEW ── */
    #detail-view {
      display: none;
      flex-direction: column;
      flex: 1;
      padding: 20px 16px;
    }

    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 16px;
      padding: 4px 0;
      margin-bottom: 24px;
    }
    .back-btn:hover { opacity: 0.75; }

    .detail-name {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }
    .detail-branch {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .detail-fields {
      border-top: 1px solid var(--border);
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .detail-label {
      font-size: 14px;
      color: var(--text-muted);
      flex: 1;
      line-height: 1.4;
    }
    .detail-value {
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
      text-align: right;
      flex-shrink: 0;
      max-width: 55%;
      word-break: break-word;
    }
    .detail-value a {
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
    }
    .detail-value a:hover { text-decoration: underline; }

    /* ── SUMMARY BOX ── */
    .summary-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 28px;
    }
    .summary-cell {
      background: var(--surface2);
      border: 1px solid var(--accent-dim);
      border-radius: var(--radius);
      padding: 18px 14px 16px;
      text-align: center;
    }
    .summary-cell-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .summary-cell-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
    }

    /* responsive */
    @media (min-width: 500px) {
      .app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Loader -->
  <div id="loader">
    <div class="spinner"></div>
    <p>Loading data.xlsx…</p>
  </div>

  <!-- File picker fallback -->
  <div id="file-picker">
    <h2>Open data.xlsx</h2>
    <p>Could not auto-load the file.<br>Please select <strong>data.xlsx</strong> from your computer.</p>
    <button class="file-btn" onclick="document.getElementById('file-input').click()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Choose File
    </button>
    <input type="file" id="file-input" accept=".xlsx,.xls" />
  </div>

  <!-- List view -->
  <div id="list-view">
    <div class="top-bar">
    </div>
    <div class="page-title">Initial Deposit</div>
    <div class="search-row">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="search-input" type="text" placeholder="Search" autocomplete="off" />
      </div>
    </div>
    <div class="cards-grid" id="cards-grid"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- Detail view -->
  <div id="detail-view">
    <button class="back-btn" id="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <div class="detail-name" id="detail-name"></div>
    <div class="detail-branch" id="detail-branch"></div>
    <div class="detail-fields" id="detail-fields"></div>
    <div class="summary-box" id="detail-summary"></div>
  </div>

</div>

<script>
const ITEMS_PER_PAGE = 10;
let allRows = [];
let filtered = [];
let currentPage = 1;

const SKIP_COLS = new Set(['transaction screenshot', 'timestamp']);
const NAME_COL = 'name';
const BRANCH_COL = 'branch';
const AMOUNT_COL = 'initial deposit amount paid';
const TOTAL_COL = 'total';
const OUTSTANDING_COL = 'outstanding';
const CURRENCY_COLS = new Set([AMOUNT_COL, TOTAL_COL, OUTSTANDING_COL]);

function normalizeKey(k) {
  return String(k).trim().toLowerCase();
}

function findCol(headers, target) {
  return headers.find(h => normalizeKey(h) === target) || null;
}

function initData(rows) {
  allRows = rows;
  filtered = rows;
  renderList();
  showView('list');
}

function renderList() {
  const grid = document.getElementById('cards-grid');
  const start = (currentPage - 1) * ITEMS_PER_PAGE;
  const page = filtered.slice(start, start + ITEMS_PER_PAGE);

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">No results found</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const headers = allRows.length ? Object.keys(allRows[0]) : [];
  const nameKey = findCol(headers, NAME_COL) || headers[1] || headers[0];
  const branchKey = findCol(headers, BRANCH_COL) || headers[2] || null;
  const amountKey = findCol(headers, AMOUNT_COL) || null;

  grid.innerHTML = page.map((row, i) => {
    const name = row[nameKey] || '—';
    const branch = branchKey ? (row[branchKey] || '') : '';
    const amount = amountKey ? (row[amountKey] || '') : '';
    const idx = start + i;
    return `
      <div class="card" data-idx="${idx}" role="button" tabindex="0">
        ${branch ? `<div class="card-badge">${escHtml(branch)}</div>` : ''}
        <div class="card-name">${escHtml(name)}</div>
        ${amount ? `<div class="card-amount">${escHtml(formatCurrency(amount))}</div>` : ''}
      </div>`;
  }).join('');

  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => openDetail(+card.dataset.idx));
    card.addEventListener('keydown', e => { if (e.key === 'Enter') openDetail(+card.dataset.idx); });
  });

  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length / ITEMS_PER_PAGE);
  if (total <= 1) { document.getElementById('pagination').innerHTML = ''; return; }

  const pages = paginationPages(currentPage, total);
  let html = `<button class="page-btn" id="prev-btn" ${currentPage === 1 ? 'disabled' : ''}>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
  </button>`;

  pages.forEach(p => {
    if (p === '…') {
      html += `<span class="page-ellipsis">…</span>`;
    } else {
      html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" data-page="${p}">${p}</button>`;
    }
  });

  html += `<button class="page-btn" id="next-btn" ${currentPage === total ? 'disabled' : ''}>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
  </button>`;

  const el = document.getElementById('pagination');
  el.innerHTML = html;

  el.querySelector('#prev-btn')?.addEventListener('click', () => { currentPage--; renderList(); });
  el.querySelector('#next-btn')?.addEventListener('click', () => { currentPage++; renderList(); });
  el.querySelectorAll('[data-page]').forEach(btn => {
    btn.addEventListener('click', () => { currentPage = +btn.dataset.page; renderList(); });
  });
}

function paginationPages(cur, total) {
  if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
  if (cur <= 4) return [1, 2, 3, 4, 5, '…', total];
  if (cur >= total - 3) return [1, '…', total - 4, total - 3, total - 2, total - 1, total];
  return [1, '…', cur - 1, cur, cur + 1, '…', total];
}

function openDetail(idx) {
  const row = filtered[idx];
  if (!row) return;

  const headers = Object.keys(row);
  const nameKey = findCol(headers, NAME_COL) || headers[1] || headers[0];
  const branchKey = findCol(headers, BRANCH_COL) || headers[2] || null;
  const totalKey = findCol(headers, TOTAL_COL);
  const outstandingKey = findCol(headers, OUTSTANDING_COL);

  document.getElementById('detail-name').textContent = row[nameKey] || '—';
  document.getElementById('detail-branch').textContent = branchKey ? (row[branchKey] || '') : '';

  const summaryKeys = new Set([totalKey, outstandingKey].filter(Boolean));

  const fields = document.getElementById('detail-fields');
  fields.innerHTML = headers
    .filter(k => k !== nameKey && k !== branchKey && !SKIP_COLS.has(normalizeKey(k)) && !summaryKeys.has(k))
    .map(k => {
      const val = row[k];
      if (val === null || val === undefined || val === '') return '';
      const valStr = String(val);
      const isLink = valStr.startsWith('http');
      const displayStr = CURRENCY_COLS.has(normalizeKey(k)) ? formatCurrency(valStr) : valStr;
      const valHtml = isLink
        ? `<a href="${escAttr(valStr)}" target="_blank" rel="noopener">View</a>`
        : escHtml(displayStr);
      return `<div class="detail-row">
        <span class="detail-label">${escHtml(k)}</span>
        <span class="detail-value">${valHtml}</span>
      </div>`;
    }).join('');

  const summary = document.getElementById('detail-summary');
  if (totalKey || outstandingKey) {
    const totalVal = totalKey ? (row[totalKey] ?? '—') : '—';
    const outVal = outstandingKey ? (row[outstandingKey] ?? '—') : '—';
    summary.innerHTML = `
      <div class="summary-cell">
        <div class="summary-cell-label">Total</div>
        <div class="summary-cell-value">${escHtml(formatCurrency(totalVal))}</div>
      </div>
      <div class="summary-cell">
        <div class="summary-cell-label">Outstanding</div>
        <div class="summary-cell-value">${escHtml(formatCurrency(outVal))}</div>
      </div>`;
  } else {
    summary.innerHTML = '';
  }

  showView('detail');
}

function showView(view) {
  document.getElementById('list-view').style.display = view === 'list' ? 'flex' : 'none';
  document.getElementById('detail-view').style.display = view === 'detail' ? 'flex' : 'none';
  document.getElementById('loader').style.display = 'none';
  document.getElementById('file-picker').style.display = 'none';
  window.scrollTo(0, 0);
}

function formatCurrency(val) {
  const s = String(val);
  return s.startsWith('₹') ? s : '₹' + s;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function parseWorkbook(wb) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const raw = XLSX.utils.sheet_to_json(ws, { defval: '' });
  if (!raw.length) return [];
  // Trim whitespace from keys and string values
  return raw.map(r => {
    const clean = {};
    for (const [k, v] of Object.entries(r)) {
      clean[k.trim()] = typeof v === 'string' ? v.trim() : v;
    }
    return clean;
  });
}

// Search
document.getElementById('search-input').addEventListener('input', function () {
  const q = this.value.trim().toLowerCase();
  if (!q) {
    filtered = allRows;
  } else {
    filtered = allRows.filter(row =>
      Object.values(row).some(v => String(v).toLowerCase().includes(q))
    );
  }
  currentPage = 1;
  renderList();
});

// Back button
document.getElementById('back-btn').addEventListener('click', () => showView('list'));

// File input fallback
document.getElementById('file-input').addEventListener('change', function () {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
    initData(parseWorkbook(wb));
  };
  reader.readAsArrayBuffer(file);
});

// Auto-load data.xlsx via fetch
(async () => {
  try {
    const res = await fetch('data.xlsx');
    if (!res.ok) throw new Error('fetch failed');
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(new Uint8Array(buf), { type: 'array' });
    initData(parseWorkbook(wb));
  } catch {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('file-picker').style.display = 'flex';
  }
})();
</script>
</body>
</html>
